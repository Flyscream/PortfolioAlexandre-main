<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projets — Portfolio Alexandre Gleizes</title>
  <link rel="stylesheet" href="../css/style-global.css">
  <link rel="stylesheet" href="../css/stylepageprojet.css">
</head>
<body>

  <header id="main-header">
    <div class="nav-inner">
      <a href="pageaccueil_portfolio.html" class="nav-logo">AG<span class="accent">.</span></a>
      <ul class="nav-links" id="nav-menu">
        <li><a href="pageaccueil_portfolio.html">Accueil</a></li>
        <li><a href="pagecompetences_portfolio.html">Compétences</a></li>
        <li><a href="pageprojet_portfolio.html" class="active">Projets</a></li>
        <li><a href="pageStage.html">Stage</a></li>
        <li><a href="Contact.html" class="nav-cta">Contact</a></li>
      </ul>
      <button class="burger" id="burger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </header>

  <main>
    <div class="page-wrap">
      <div class="page-hero">
        <p class="page-eyebrow reveal"><span class="eyebrow-bar"></span>Ce que j'ai réalisé</p>
        <h1 class="page-title reveal">Mes <span>Projets</span></h1>
        <p class="page-subtitle reveal">Une sélection de projets réalisés en formation, en équipe ou en stage.</p>
        <div class="page-divider reveal"></div>
      </div>
      <section id="projects" class="projects-list"></section>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <div><div class="footer-brand">AG<span class="accent">.</span></div><div class="footer-info">Alexandre Gleizes · Portfolio 2025</div></div>
      <div class="footer-links">
        <a href="pagecompetences_portfolio.html">Compétences</a>
        <a href="pageStage.html">Stage</a>
        <a href="Contact.html">Contact</a>
        <a href="https://github.com/Flyscream" target="_blank" rel="noopener">GitHub ↗</a>
      </div>
      <div class="contact-info"><a href="mailto:alexgleizes18@gmail.com">alexgleizes18@gmail.com</a></div>
    </div>
  </footer>

  <script>
    const header = document.getElementById('main-header');
    window.addEventListener('scroll', () => header.classList.toggle('scrolled', scrollY > 40));
    document.getElementById('burger').addEventListener('click', function() {
      this.classList.toggle('open');
      document.getElementById('nav-menu').classList.toggle('open');
    });

    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in-view'); });
    }, { threshold: 0.08 });
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

    fetch('../data/projets.json')
      .then(r => r.json())
      .then(data => {
        const container = document.getElementById('projects');
        container.innerHTML = data.map((p, i) => `
          <article class="project-card reveal" style="transition-delay:${i * 0.07}s">
            <div class="project-img-wrap">
              <img src="${p.image}" alt="${p.titre}">
              <div class="project-num">${String(i + 1).padStart(2,'0')}</div>
            </div>
            <div class="project-body">
              <h3>${p.titre}</h3>
              <p>${p.description}</p>
            </div>
          </article>
        `).join('');
        document.querySelectorAll('.project-card').forEach(el => obs.observe(el));
      })
      .catch(err => console.error('Erreur chargement projets :', err));
  </script>
</body>
</html>
