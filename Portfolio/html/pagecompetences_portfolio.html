<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compétences — Portfolio Alexandre Gleizes</title>
  <link rel="stylesheet" href="../css/style-global.css">
  <link rel="stylesheet" href="../css/stylepagecompetences.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

  <header id="main-header">
    <div class="nav-inner">
      <a href="pageaccueil_portfolio.html" class="nav-logo">AG<span class="accent">.</span></a>
      <ul class="nav-links" id="nav-menu">
        <li><a href="pageaccueil_portfolio.html">Accueil</a></li>
        <li><a href="pagecompetences_portfolio.html" class="active">Compétences</a></li>
        <li><a href="pageprojet_portfolio.html">Projets</a></li>
        <li><a href="pageStage.html">Stage</a></li>
        <li><a href="Contact.html" class="nav-cta">Contact</a></li>
      </ul>
      <button class="burger" id="burger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </header>

  <main>
    <div class="page-wrap">
      <div class="page-hero">
        <p class="page-eyebrow reveal"><span class="eyebrow-bar"></span>Mon niveau</p>
        <h1 class="page-title reveal">Mes <span>Compétences</span></h1>
        <p class="page-subtitle reveal">Technologies et outils maîtrisés au fil de mes projets et expériences.</p>
        <div class="page-divider reveal"></div>
      </div>
      <section id="competences-container" class="skills-grid"></section>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <div><div class="footer-brand">AG<span class="accent">.</span></div><div class="footer-info">Alexandre Gleizes · Portfolio 2025</div></div>
      <div class="footer-links">
        <a href="pageprojet_portfolio.html">Projets</a>
        <a href="pageStage.html">Stage</a>
        <a href="Contact.html">Contact</a>
        <a href="https://github.com/Flyscream" target="_blank" rel="noopener">GitHub ↗</a>
      </div>
      <div class="contact-info"><a href="mailto:alexgleizes18@gmail.com">alexgleizes18@gmail.com</a></div>
    </div>
  </footer>

  <script>
    const header = document.getElementById('main-header');
    window.addEventListener('scroll', () => header.classList.toggle('scrolled', scrollY > 40));
    document.getElementById('burger').addEventListener('click', function() {
      this.classList.toggle('open');
      document.getElementById('nav-menu').classList.toggle('open');
    });

    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in-view'); });
    }, { threshold: 0.08 });
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

    fetch('../data/competences.json')
      .then(r => r.json())
      .then(data => {
        const container = document.getElementById('competences-container');
        container.innerHTML = data.map((skill, i) => `
          <div class="skill-card reveal" style="transition-delay:${i * 0.05}s">
            <div class="skill-icon">
              <img src="${skill.image}" alt="${skill.competence}">
            </div>
            <div class="skill-body">
              <div class="skill-header">
                <h3>${skill.competence}</h3>
                <span class="skill-pct">${skill.niveau}%</span>
              </div>
              <p class="skill-desc">${skill.description}</p>
              <div class="skill-bar">
                <div class="skill-fill" style="width:0%" data-w="${skill.niveau}%"></div>
              </div>
            </div>
          </div>
        `).join('');

        // Re-observer les nouvelles cartes
        document.querySelectorAll('.skill-card').forEach(el => obs.observe(el));

        // Animer les barres quand elles entrent dans le viewport
        const barObs = new IntersectionObserver(entries => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              const fill = e.target.querySelector('.skill-fill');
              if (fill) setTimeout(() => fill.style.width = fill.dataset.w, 100);
            }
          });
        }, { threshold: 0.2 });
        document.querySelectorAll('.skill-card').forEach(el => barObs.observe(el));
      })
      .catch(err => console.error('Erreur chargement compétences :', err));
  </script>
</body>
</html>
